# ==========================================================================
# DeRisk Protocol - CRE Workflow Settings
# ==========================================================================
# AI-Powered DeFi Risk Oracle for Chainlink Convergence Hackathon 2026
# Monitors Aave V3, runs Claude AI risk analysis, writes on-chain

# ==========================================================================
staging-settings:
  user-workflow:
    workflow-name: "derisk-protocol-staging"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.staging.json"
    secrets-path: "./secrets.json"

# ==========================================================================
# Local development target: uses config.local.json (gitignored) which holds
# the real Anthropic API key for testing AI scoring in simulation mode.
# Copy config.staging.json → config.local.json and fill in anthropicApiKey.
local-settings:
  user-workflow:
    workflow-name: "derisk-protocol-local"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.local.json"
    secrets-path: "./secrets.json"

# ==========================================================================
production-settings:
  user-workflow:
    workflow-name: "derisk-protocol-production"
  workflow-artifacts:
    workflow-path: "./main.ts"
    config-path: "./config.production.json"
    secrets-path: "./secrets.json"
